name: Documentation

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Jazzy needs Xcode (xcodebuild + SourceKitten); Zensical runs fine on macOS too.
    runs-on: macos-latest
    steps:
      - uses: actions/configure-pages@v5

      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Checkout iOS app (for Jazzy)
        uses: actions/checkout@v4
        with:
          repository: sksimmons/HouseOfOrder-iOS
          path: ios-src
          # Private iOS repo: add repository secret HOUSEOFORDER_IOS_CHECKOUT (fine-grained PAT, Contents: Read).
          # Public iOS repo: leave secret unset (empty token is fine for public clones).
          token: ${{ secrets.HOUSEOFORDER_IOS_CHECKOUT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zensical
        run: pip install -r requirements.txt

      - name: Build Zensical site
        run: zensical build --clean

      - name: Install Jazzy dependencies
        run: |
          brew install pkg-config
          sudo gem install jazzy

      - name: Generate Swift API docs (Jazzy)
        working-directory: ios-src
        run: jazzy --config .jazzy.yaml

      - name: Merge Jazzy output into site
        run: |
          mkdir -p site/api
          cp -R ios-src/Docs/jazzy-output/. site/api/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
