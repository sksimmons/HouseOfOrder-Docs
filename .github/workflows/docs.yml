name: Documentation

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Jazzy needs Xcode (xcodebuild + SourceKitten); Zensical runs fine on macOS too.
    runs-on: macos-latest
    steps:
      - uses: actions/configure-pages@v5

      - name: Checkout docs repo
        uses: actions/checkout@v4

      # actions/checkout requires a non-empty token to clone another *private* repo; unset secret => hard error.
      - name: Require PAT for private HouseOfOrder-iOS clone
        env:
          IOS_PAT: ${{ secrets.HOUSEOFORDER_IOS_CHECKOUT }}
        run: |
          if [ -z "$IOS_PAT" ]; then
            echo "::error::Add repository secret HOUSEOFORDER_IOS_CHECKOUT on HouseOfOrder-Docs (fine-grained PAT, Contents: Read on sksimmons/HouseOfOrder-iOS). See README.md → Publishing."
            exit 1
          fi

      - name: Checkout iOS app (for Jazzy)
        uses: actions/checkout@v4
        with:
          repository: sksimmons/HouseOfOrder-iOS
          path: ios-src
          token: ${{ secrets.HOUSEOFORDER_IOS_CHECKOUT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zensical
        run: pip install -r requirements.txt

      - name: Build Zensical site
        run: zensical build --clean

      - name: Install Jazzy dependencies
        run: |
          brew install pkg-config
          sudo gem install jazzy

      - name: Generate Swift API docs (Jazzy)
        working-directory: ios-src
        run: jazzy --config .jazzy.yaml

      - name: Merge Jazzy output into site
        run: |
          mkdir -p site/api
          cp -R ios-src/Docs/jazzy-output/. site/api/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
